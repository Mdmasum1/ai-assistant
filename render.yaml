services:
  - type: web
    name: ai-voice-assistant-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run_web.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GUMROAD_BASIC_URL
        value: https://gumroad.com/l/ai-voice-assistant-basic
      - key: GUMROAD_PRO_URL
        value: https://gumroad.com/l/ai-voice-assistant-pro
      - key: GUMROAD_DEV_URL
        value: https://gumroad.com/l/ai-voice-assistant-dev
    healthCheckPath: /api/assistant/status
    disk:
      name: ai-assistant-disk
      mountPath: /opt/render/project/src/database
      sizeGB: 1

